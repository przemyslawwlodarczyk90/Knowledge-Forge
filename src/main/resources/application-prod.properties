# ===============================
# APP
# ===============================
spring.application.name=Knowledge-Forge
server.port=8081

# ===============================
# DATABASE - POSTGRES
# ===============================
spring.datasource.url=jdbc:postgresql://localhost:5432/pgDB
spring.datasource.username=user
spring.datasource.password=password
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.open-in-view=false

# ===============================
# JWT
# ===============================
jwt.secret=yourSuperSecretKeyThatIsAtLeast32CharactersLong
jwt.issuer=knowledge-forge
jwt.expiration-time-ms=3600000

# ===============================
# MAIL
# ===============================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=userbridge9@gmail.com
spring.mail.password=mnuv bxzq bvla oieg
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.ssl.trust=smtp.gmail.com
spring.mail.properties.mail.smtp.ssl.protocols=TLSv1.2
spring.mail.properties.mail.debug=false

# ===============================
# THYMELEAF
# ===============================
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.check-template-location=true

# ===============================
# JACKSON / TIMEZONE
# ===============================
spring.jackson.time-zone=UTC

# ===============================
# SWAGGER
# ===============================
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.packages-to-scan=com.example.offerbrowserprototype.infrastructure.web

# ===============================
# CORS / BASE URL
# ===============================
app.cors.allowed-origin=http://localhost:3000
app.server.base-url=http://localhost:8081
app.frontend.base-url=http://localhost:3000

# ===============================
# SPRING AI — OpenAI
# ===============================
# Ustaw OPENAI_API_KEY jako zmienną środowiskową, a następnie zmień enabled na true
knowledge.ai.openai.enabled=false
spring.ai.openai.api-key=${OPENAI_API_KEY:placeholder-configure-me}
spring.ai.openai.chat.options.model=gpt-4o-mini
spring.ai.openai.chat.options.temperature=0.4

# ===============================
# ADMIN SEEDER
# ===============================
app.admin.username=admin
app.admin.email=admin@knowledge-forge.local
app.admin.password=Admin123!

# ===============================
# LOGGING
# ===============================
logging.level.org.springframework.boot=INFO
logging.level.org.hibernate.SQL=DEBUG
